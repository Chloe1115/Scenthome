<p class="text-on-surface-variant font-body text-sm leading-relaxed max-w-[320px] mx-auto">

<!-- Interaction Form -->
<form action="#" class="space-y-6" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-xs font-label uppercase tracking-widest text-on-surface-variant pl-1" for="email">Email</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">mail</span>
<input class="w-full bg-surface-container-low border-none rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 transition-colors focus:bg-surface-container-high focus:ring-0 focus:border-b-2 focus:border-tertiary" id="email" name="email" placeholder="curator@scenthome.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">

<a class="text-[10px] uppercase font-bold tracking-wider text-primary hover:text-primary-container transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">

<input class="w-full bg-surface-container-low border-none rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 transition-colors focus:bg-surface-container-high focus:ring-0 focus:border-b-2 focus:border-tertiary" id="password" name="password" placeholder="••••••••" type="password"/>

</div>

<button class="w-full py-4 bg-surface-container-highest text-on-surface font-label font-semibold rounded-lg hover:bg-surface-dim transition-all" type="button">

</div>
